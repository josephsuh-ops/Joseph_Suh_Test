<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOC Management Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #007BFF; padding: 1rem; color: white; text-align: center; }
        .tabs { display: flex; background: #f1f1f1; padding: 1rem; }
        .tab { margin-right: 1rem; padding: 1rem; background: #e7e7e7; cursor: pointer; }
        .tab.active { background: #007BFF; color: white; }
        .content { padding: 2rem; }
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; width: 80%; }
        .close { cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>VOC Management Dashboard</h1>
    </header>
    <div class="tabs">
        <div class="tab active" onclick="openTab('dashboard')">Dashboard</div>
        <div class="tab" onclick="openTab('voc-reports')">VOC Reports</div>
        <div class="tab" onclick="openTab('settings')">Settings</div>
    </div>
    <div class="content">
        <div id="dashboard" class="tab-content">
            <h2>Dashboard Content</h2>
            <button onclick="openModal('messageModal')">Show Message</button>
        </div>
        <div id="voc-reports" class="tab-content" style="display:none;">
            <h2>VOC Reports Content</h2>
            <form id="vocForm" onsubmit="submitForm(event)">
                <label for="vocInput">VOC Input:</label>
                <input type="text" id="vocInput" name="vocInput" required />
                <button type="submit">Submit</button>
            </form>
        </div>
        <div id="settings" class="tab-content" style="display:none;">
            <h2>Settings Content</h2>
            <!-- Settings form can go here -->
        </div>
    </div>
    <div id="messageModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('messageModal')">&times;</span>
            <p>Real-time message goes here!</p>
        </div>
    </div>
    <script>
        function openTab(tabName) {
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => {
                tab.style.display = 'none';
            });
            document.getElementById(tabName).style.display = 'block';
            const tabHeaders = document.querySelectorAll('.tab');
            tabHeaders.forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'block';
        }
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
        function submitForm(event) {
            event.preventDefault();
            const input = document.getElementById('vocInput').value;
            alert('Form submitted: ' + input);
            closeModal('messageModal'); // Example of closing modal
        }
    </script>
</body>
</html>
